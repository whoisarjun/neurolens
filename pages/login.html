<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b0f14">
    <title>Neurolens Login</title>
    <style>
        :root {
            --bg: #0b0f14;
            --panel: #151b23;
            --panel-2: #1a222c;
            --line: #252f3b;
            --text: #e6edf3;
            --muted: #94a3b8;
            --accent: #7dd3fc;
            --radius: 14px;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        * { box-sizing: border-box; }
        html {
            background: #0b0f14;
            color-scheme: dark;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0e13 0%, var(--bg) 100%);
            color: var(--text);
            font-family: var(--font);
            overflow-x: hidden;
        }
        a { color: inherit; text-decoration: none; }

        .shell {
            width: min(920px, calc(100vw - 32px));
            min-height: calc(100vh - 40px);
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .topbar,
        .panel {
            background: rgba(21, 27, 35, 0.94);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: riseIn 420ms ease both;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
        }

        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mark {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            border: 1px solid rgba(125, 211, 252, 0.35);
            color: var(--accent);
            background: rgba(125, 211, 252, 0.08);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .title { margin: 0; font-size: 0.98rem; font-weight: 700; }
        .subtle { margin: 4px 0 0; color: var(--muted); font-size: 0.84rem; }

        .nav { display: flex; flex-wrap: wrap; gap: 8px; }
        .nav a,
        .btn {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: var(--panel-2);
            font: inherit;
            color: var(--text);
            cursor: pointer;
            transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
        }

        .nav a.active { color: var(--accent); border-color: rgba(125, 211, 252, 0.35); }
        .nav a:hover,
        .btn:hover { transform: translateY(-2px); border-color: rgba(125, 211, 252, 0.35); }

        .grid {
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            gap: 14px;
            margin-top: 16px;
        }

        .panel { padding: 18px; }
        .label {
            margin: 0 0 14px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.82rem;
        }

        .fields {
            display: grid;
            gap: 12px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.84rem;
            color: var(--muted);
        }

        .field input,
        .field select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #0f141b;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .status {
            min-height: 20px;
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.84rem;
        }

        pre {
            margin: 0;
            min-height: 280px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background: #0a0e13;
            color: #cbd5e1;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 820px) {
            .topbar,
            .grid {
                grid-template-columns: 1fr;
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <div class="mark">NL</div>
                <div>
                    <p class="title">login</p>
                    <p class="subtle">auth request tester</p>
                </div>
            </div>
            <nav class="nav">
                <a href="/">overview</a>
                <a href="/patients">patients</a>
                <a href="/create">create</a>
                <a class="active" href="/login">login</a>
            </nav>
        </header>

        <main class="grid">
            <section class="panel">
                <p class="label">request</p>
                <form id="login-form">
                    <div class="fields">
                        <div class="field">
                            <label for="patient_id">patient_id</label>
                            <input id="patient_id" name="patient_id" type="text">
                        </div>
                        <div class="field">
                            <label for="password">password</label>
                            <input id="password" name="password" type="password">
                        </div>
                        <div class="field">
                            <label for="role">role</label>
                            <select id="role" name="role">
                                <option value="patient">patient</option>
                                <option value="caregiver">caregiver</option>
                            </select>
                        </div>
                    </div>
                    <div class="actions">
                        <button id="submit-button" class="btn" type="submit">send</button>
                        <a class="btn" href="/">back</a>
                    </div>
                    <p id="status" class="status"></p>
                </form>
            </section>

            <section class="panel">
                <p class="label">response</p>
                <pre id="result">No request run.</pre>
            </section>
        </main>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const result = document.getElementById('result');
        const status = document.getElementById('status');
        const submitButton = document.getElementById('submit-button');

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            const formData = new FormData(form);
            const payload = {
                patient_id: formData.get('patient_id'),
                password: formData.get('password'),
                role: formData.get('role')
            };

            submitButton.disabled = true;
            status.textContent = 'Running...';
            result.textContent = '';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);
                status.textContent = response.ok ? 'Done.' : 'Request returned an error.';
            } catch (error) {
                result.textContent = JSON.stringify({
                    error: 'Request failed',
                    details: error.message
                }, null, 2);
                status.textContent = 'Request failed.';
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
