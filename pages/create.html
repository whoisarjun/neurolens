<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b0f14">
    <title>Create Patient</title>
    <style>
        :root {
            --bg: #0b0f14;
            --panel: #151b23;
            --panel-2: #1a222c;
            --line: #252f3b;
            --text: #e6edf3;
            --muted: #94a3b8;
            --accent: #7dd3fc;
            --radius: 14px;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        * { box-sizing: border-box; }
        html {
            background: #0b0f14;
            color-scheme: dark;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0e13 0%, var(--bg) 100%);
            color: var(--text);
            font-family: var(--font);
            overflow-x: hidden;
        }
        a { color: inherit; text-decoration: none; }

        .shell {
            width: min(1100px, calc(100vw - 32px));
            min-height: calc(100vh - 40px);
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .topbar,
        .panel {
            background: rgba(21, 27, 35, 0.94);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: riseIn 420ms ease both;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
        }

        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mark {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            border: 1px solid rgba(125, 211, 252, 0.35);
            color: var(--accent);
            background: rgba(125, 211, 252, 0.08);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .title { margin: 0; font-size: 0.98rem; font-weight: 700; }
        .subtle { margin: 4px 0 0; color: var(--muted); font-size: 0.84rem; }

        .nav { display: flex; flex-wrap: wrap; gap: 8px; }
        .nav a,
        .btn {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: var(--panel-2);
            font: inherit;
            color: var(--text);
            cursor: pointer;
            transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
        }

        .nav a.active { color: var(--accent); border-color: rgba(125, 211, 252, 0.35); }
        .nav a:hover,
        .btn:hover { transform: translateY(-2px); border-color: rgba(125, 211, 252, 0.35); }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 14px;
            margin-top: 16px;
        }

        .panel { padding: 18px; }
        .label {
            margin: 0 0 14px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.82rem;
        }

        .fields {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .field.full { grid-column: 1 / -1; }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.84rem;
            color: var(--muted);
        }

        .field input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #0f141b;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .status {
            min-height: 20px;
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.84rem;
        }

        .preview {
            display: grid;
            gap: 10px;
        }

        .kv {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #0f141b;
            border: 1px solid var(--line);
            font-size: 0.84rem;
        }

        .kv strong { color: var(--muted); }

        pre {
            margin: 14px 0 0;
            min-height: 240px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background: #0a0e13;
            color: #cbd5e1;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 920px) {
            .topbar,
            .grid {
                grid-template-columns: 1fr;
                flex-direction: column;
                align-items: flex-start;
            }

            .fields {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <div class="mark">NL</div>
                <div>
                    <p class="title">create</p>
                    <p class="subtle">patient creation request</p>
                </div>
            </div>
            <nav class="nav">
                <a href="/">overview</a>
                <a href="/patients">patients</a>
                <a class="active" href="/create">create</a>
                <a href="/login">login</a>
            </nav>
        </header>

        <main class="grid">
            <section class="panel">
                <p class="label">request</p>
                <form id="create-form">
                    <div class="fields">
                        <div class="field">
                            <label for="patient_id">patient_id</label>
                            <input id="patient_id" type="text" name="patient_id">
                        </div>
                        <div class="field">
                            <label for="full_name">full_name</label>
                            <input id="full_name" type="text" name="full_name">
                        </div>
                        <div class="field">
                            <label for="first_name">first_name</label>
                            <input id="first_name" type="text" name="first_name">
                        </div>
                        <div class="field">
                            <label for="age">age</label>
                            <input id="age" type="number" name="age">
                        </div>
                        <div class="field">
                            <label for="gender">gender</label>
                            <input id="gender" type="text" name="gender">
                        </div>
                        <div class="field">
                            <label for="patient_password">patient_password</label>
                            <input id="patient_password" type="password" name="patient_password">
                        </div>
                        <div class="field full">
                            <label for="caregiver_password">caregiver_password</label>
                            <input id="caregiver_password" type="password" name="caregiver_password">
                        </div>
                    </div>
                    <div class="actions">
                        <button id="submit-button" class="btn" type="submit">send</button>
                        <a class="btn" href="/">back</a>
                    </div>
                    <p id="status" class="status"></p>
                    <pre id="result">No request run.</pre>
                </form>
            </section>

            <aside class="panel">
                <p class="label">preview</p>
                <div class="preview">
                    <div class="kv"><strong>patient_id</strong><span id="preview-patient_id">-</span></div>
                    <div class="kv"><strong>full_name</strong><span id="preview-full_name">-</span></div>
                    <div class="kv"><strong>first_name</strong><span id="preview-first_name">-</span></div>
                    <div class="kv"><strong>age</strong><span id="preview-age">-</span></div>
                    <div class="kv"><strong>gender</strong><span id="preview-gender">-</span></div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const form = document.getElementById('create-form');
        const result = document.getElementById('result');
        const status = document.getElementById('status');
        const submitButton = document.getElementById('submit-button');
        const previewFields = ['patient_id', 'full_name', 'first_name', 'age', 'gender'];

        function updatePreview() {
            const data = new FormData(form);
            previewFields.forEach((key) => {
                const el = document.getElementById(`preview-${key}`);
                el.textContent = (data.get(key) || '').trim() || '-';
            });
        }

        form.addEventListener('input', updatePreview);
        updatePreview();

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            const data = new FormData(form);
            const payload = {
                patient_id: data.get('patient_id'),
                patient_password: data.get('patient_password'),
                caregiver_password: data.get('caregiver_password'),
                full_name: data.get('full_name'),
                first_name: data.get('first_name'),
                age: Number(data.get('age')),
                gender: data.get('gender')
            };

            submitButton.disabled = true;
            status.textContent = 'Running...';
            result.textContent = '';

            try {
                const response = await fetch('/create_patient', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const body = await response.json();
                result.textContent = JSON.stringify(body, null, 2);
                status.textContent = response.ok ? 'Done.' : 'Request returned an error.';
            } catch (error) {
                result.textContent = JSON.stringify({
                    error: 'Request failed',
                    details: error.message
                }, null, 2);
                status.textContent = 'Request failed.';
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
